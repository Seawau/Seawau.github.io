         <h1>Contact Me</h1>

         <!-- Contact form for users to reach out -->
         <form action="mailto:ghulett@example.com?Subject=Form%20Submission" method="post" enctype="text/plain">
            <label for="title">Title:</label>
            <select id="title" name="title" required>
                <option value="">Select a title</option>
                <option value="Mr.">Mr.</option>
                <option value="Ms.">Ms.</option>
                <option value="Mrs.">Mrs.</option>
                <option value="Dr.">Dr.</option>
            </select>

            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>

            <label for ="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" required>

            <label for="topic">Reason for Contact:</label>
            <select id="topic" name="topic" required>
                <option value="">Select a reason</option>
                <option value="Question">Question</option>
                <option value="Feedback">Feedback</option>
                <option value="Collaboration">Collaboration</option>
            </select>

            <label for="message">Message:</label>
            <textarea id="message" name="message" placeholder="Enter your message here" rows="5" required></textarea>

            <input type="submit" value="Submit">
         </form>
