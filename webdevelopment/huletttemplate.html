<!DOCTYPE html>
<!-- tells you the document is an HTML5 document -->
<html lang="en">
    <!-- opening tag of the html element and sets the language to english -->
    <!--
  Name: ___
  Date: ____
  Course: ____
  Description: ____
-->
    <head>
        <meta charset="utf-8">
        <!-- sets the character encoding for the document -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- sets the viewport for the document (mobile friendly) so the content is scaled properly on different devices -->
        <title>My Starter Template</title>
         <!-- sets the title for the document -->
        <link rel="stylesheet" href="style.css">
         <!-- links to an external stylesheet called style.css -->
    </head>
     <!-- the head contains meta information about the document, such as the title and links to stylesheets -->
    
    <body>
        <h1>Hello, world!</h1>
        <header>
        </header>
        <!-- the header contains introductory content, navigational links, and the logo --> 
        <footer>
            <p>June 20, 2026 - Gracie Hulett.</p>
        </footer>
        <!-- the footer contains information about the author, copyright information, and links to related documents -->
    </body>
    <!-- the body contains the visible content of the page -->
</html>
